<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>響應式卡片頁面</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="bootstrapcolor.css" rel="stylesheet">
  <style>
    pre {
        background: linear-gradient(to bottom, #212529, #343a40); /* 類似 bg-dark + bg-gradient */
        color: #ffc107; /* Bootstrap 的 text-warning 對應顏色 */
        font-weight: bold;
        padding: 1rem;
        border-radius: 0.375rem;
        font-family: monospace;
        white-space: pre-wrap; /* 保持預設格式換行 */
    }

    .dropdown-menu {
        background-color: #9f6fe7;
        border: none;
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.2);
    }

    .dropdown-item {
        color: #ffffff;
        transition: background-color 0.3s, color 0.3s;
    }

    .dropdown-item:hover, .dropdown-item:focus {
        background-color: #d6b2f7;
        color: blue;
    }

    .form-control:hover, .form-control:focus {
        border-color: #d6b2f7;
        box-shadow: 0 0 5px #d6b2f7;
        outline: none;
    }

    .btn-outline-light:hover {
        background-color: #d6b2f7;
        color: #000;
        box-shadow: 0 0 10px #d6b2f7, 0 0 20px #d6b2f7;
        border-color: #d6b2f7;
    }

    input::placeholder {
        color: black !important;
        opacity: 0.8;
    }
  </style>
</head>
<body>

  <!-- 導覽列 -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-purple">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">網站標題</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="#">首頁</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">關於我們</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                        服務項目
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                        <li><a class="dropdown-item" href="#">項目1</a></li>
                        <li><a class="dropdown-item" href="#">項目2</a></li>
                        <li><a class="dropdown-item" href="#">項目3</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">聯絡我們</a>
                </li>
            </ul>
            <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2 ms-lg-auto mt-3 mt-lg-0">
                <div class="input-group">
                    <span class="input-group-text bg-light text-dark border-secondary">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="search" class="form-control bg-light text-dark border-secondary" placeholder="搜尋" aria-label="Search">
                </div>
                <button class="btn btn-outline-light" type="button">
                    <i class="bi bi-box-arrow-in-right me-1"></i> 登入
                </button>
                <button class="btn btn-outline-light" type="button">
                    <i class="bi bi-person-plus me-1"></i> 註冊
                </button>
            </div>
        </div>
    </div>
  </nav> 

  <!-- 主內容：卡片區 -->
  <div class="container my-5">
    <div class="row">
      <!-- 卡片 1 -->
      <div class="col-12 col-md-6 col-lg-4 mb-4">
        <div class="card h-100">
          <img src="https://picsum.photos/400/200?random=1" class="card-img-top" alt="圖片1">
          <div class="card-body">
            <h5 class="card-title">卡片標題 1</h5>
            <p class="card-text">這是第一張卡片的內容摘要。</p>
            <a href="#" class="btn btn-primary">了解更多</a>
          </div>
        </div>
      </div>
      <!-- 卡片 2 -->
      <div class="col-12 col-md-6 col-lg-4 mb-4">
        <div class="card h-100">
          <img src="https://picsum.photos/400/200?random=2" class="card-img-top" alt="圖片2">
          <div class="card-body">
            <h5 class="card-title">卡片標題 2</h5>
            <p class="card-text">這是第二張卡片的內容摘要。</p>
            <a href="#" class="btn btn-primary">了解更多</a>
          </div>
        </div>
      </div>
      <!-- 卡片 3 -->
      <div class="col-12 col-md-6 col-lg-4 mb-4">
        <div class="card h-100">
          <img src="https://picsum.photos/400/200?random=3" class="card-img-top" alt="圖片3">
          <div class="card-body">
            <h5 class="card-title">卡片標題 3</h5>
            <p class="card-text">這是第三張卡片的內容摘要。</p>
            <a href="#" class="btn btn-primary">了解更多</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS（包含下拉與漢堡選單功能） -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
