<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="keyword" content="html5, 網頁設計, css, javascript">
	<meta name="description" content="holy grail layout">
	<meta name="author" content="王群銘">
	<title>聖杯佈局Holy Grail Layout</title>
	<style type="text/css">
        .container {
            display: grid;
            grid-template-columns: 0.5fr 1.7fr 0.5fr;
            grid-template-rows: 0.5fr 1.9fr 0.5fr;
            gap: 2px 2px;
            grid-auto-flow: row;
            grid-template-areas:
                "header header header"
                "left center right"
                "footer footer footer";
            }

        .header {
            grid-area: header;
        }

        .footer {
            grid-area: footer;
        }

        .left {
            grid-area: left;
        }

        .center {
            grid-area: center;
        }

        .right {
            grid-area: right;
        }

        html, body , .container {
            height: 100%;
            margin: 0;
        }

    /* For presentation only, no need to copy the code below */

        .container * {
            border: 1px solid red;
            position: relative;
        }

        .container *:after {
            content:attr(class);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            align-items: center;
            justify-content: center;
         }


    </style>
</head>
<body>
    <div class="container">
        <div class="header"></div>
        <div class="footer"></div>
        <div class="left"></div>
        <div class="center"></div>
        <div class="right"></div>
      </div>
</body>
</html>
